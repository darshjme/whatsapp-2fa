<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 90" width="820" height="90">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#30363d"/>
    </marker>
  </defs>
  <rect width="820" height="90" rx="10" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="819" height="89" rx="10" fill="none" stroke="#30363d" stroke-width="0.5"/>

  <!-- 1st: instant -->
  <rect x="10" y="20" width="105" height="50" rx="25" fill="#0b1f13" stroke="#3fb950" stroke-width="1.5"/>
  <text x="62" y="39" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">1st</text>
  <text x="62" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#3fb950" text-anchor="middle" font-weight="700">instant</text>
  <!-- connector 1-2 -->
  <line x1="118" y1="45" x2="138" y2="45" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 2nd: 2m -->
  <rect x="142" y="20" width="105" height="50" rx="25" fill="#0f1f0e" stroke="#56d364" stroke-width="1.5"/>
  <text x="194" y="39" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">2nd</text>
  <text x="194" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#56d364" text-anchor="middle" font-weight="700">2m</text>
  <!-- connector 2-3 -->
  <line x1="250" y1="45" x2="270" y2="45" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 3rd: 5m -->
  <rect x="274" y="20" width="105" height="50" rx="25" fill="#15200e" stroke="#a3c93a" stroke-width="1.5"/>
  <text x="326" y="39" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">3rd</text>
  <text x="326" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#a3c93a" text-anchor="middle" font-weight="700">5m</text>
  <!-- connector 3-4 -->
  <line x1="382" y1="45" x2="402" y2="45" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 4th: 10m -->
  <rect x="406" y="20" width="105" height="50" rx="25" fill="#1a1d0e" stroke="#d29922" stroke-width="1.5"/>
  <text x="458" y="39" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">4th</text>
  <text x="458" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#d29922" text-anchor="middle" font-weight="700">10m</text>
  <!-- connector 4-5 -->
  <line x1="514" y1="45" x2="534" y2="45" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 5th: 60m -->
  <rect x="538" y="20" width="105" height="50" rx="25" fill="#1f150e" stroke="#e8722a" stroke-width="1.5"/>
  <text x="590" y="39" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">5th</text>
  <text x="590" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#e8722a" text-anchor="middle" font-weight="700">60m</text>
  <!-- connector 5-6 -->
  <line x1="646" y1="45" x2="666" y2="45" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3">
    <animate attributeName="stroke-dashoffset" values="14;0" dur="1.5s" repeatCount="indefinite"/>
  </line>

  <!-- 6th+: 60hr -->
  <rect x="670" y="20" width="138" height="50" rx="25" fill="#1f0e0e" stroke="#f85149" stroke-width="1.5"/>
  <text x="739" y="39" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">6th+</text>
  <text x="739" y="55" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#f85149" text-anchor="middle" font-weight="700">60 hours</text>
</svg>
