<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#111820;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#25D366"/>
      <stop offset="50%" style="stop-color:#1EB854"/>
      <stop offset="100%" style="stop-color:#128C7E"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#25D366"/>
      <stop offset="100%" style="stop-color:#075E54"/>
    </linearGradient>
    <filter id="shieldGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="180" rx="12" fill="url(#heroBg)"/>
  <rect x="1" y="1" width="798" height="178" rx="12" fill="none" stroke="#25D366" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Shield with pulse animation -->
  <g filter="url(#shieldGlow)">
    <g transform="translate(155, 90)">
      <animateTransform attributeName="transform" type="scale" values="1;1.04;1" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      <!-- Shield shape -->
      <path d="M0,-48 L-35,-32 L-35,10 C-35,34 0,52 0,52 C0,52 35,34 35,10 L35,-32 Z" fill="url(#shieldGrad)" opacity="0.9">
        <animate attributeName="opacity" values="0.9;1;0.9" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <path d="M0,-48 L-35,-32 L-35,10 C-35,34 0,52 0,52 C0,52 35,34 35,10 L35,-32 Z" fill="none" stroke="#25D366" stroke-width="1" stroke-opacity="0.4"/>
      <!-- Lock body -->
      <rect x="-10" y="-10" width="20" height="16" rx="3" fill="#0d1117" opacity="0.85"/>
      <!-- Lock shackle -->
      <path d="M-7,-10 L-7,-18 C-7,-25 7,-25 7,-18 L7,-10" fill="none" stroke="#0d1117" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
      <!-- Keyhole -->
      <circle cx="0" cy="-3" r="3" fill="#25D366" opacity="0.9"/>
      <rect x="-1.2" y="-2" width="2.4" height="7" rx="1" fill="#25D366" opacity="0.9"/>
    </g>
  </g>
  <!-- Title -->
  <text x="440" y="78" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="50" font-weight="800" fill="url(#titleGrad)" text-anchor="middle" letter-spacing="-1">WhatsApp 2FA</text>
  <!-- Subtitle -->
  <text x="440" y="112" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="3" font-weight="400">SELF-HOSTED OTP AUTHENTICATION</text>
  <!-- Version pill -->
  <rect x="383" y="128" width="114" height="24" rx="12" fill="#25D366" fill-opacity="0.08" stroke="#25D366" stroke-opacity="0.2" stroke-width="1"/>
  <text x="440" y="144" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" fill="#25D366" text-anchor="middle" font-weight="600">v1.0.0 &#183; MIT</text>
</svg>
